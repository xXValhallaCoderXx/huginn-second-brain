# Docker Compose for Huginn Second Brain
# Local testing: run `npx openclaw gateway start` directly (no Docker needed)
# VPS deployment: `docker compose up -d`
#
# Quick start:
#   1. cp .env.example .env && edit .env (fill in API keys)
#   2. docker compose up -d
#   3. docker compose logs -f openclaw

services:
  openclaw:
    image: node:22-slim
    container_name: huginn-openclaw
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "npm install -g openclaw@latest &&
             cp -rn /app/workspace/* /root/.openclaw/workspace/ 2>/dev/null || true &&
             openclaw gateway --port 18789"
    volumes:
      - ./config/openclaw.json:/root/.openclaw/openclaw.json
      - ./workspace:/app/workspace:ro
      - openclaw-state:/root/.openclaw
      - vault-data:/vault
    ports:
      - "127.0.0.1:18789:18789"  # OpenClaw gateway
      - "127.0.0.1:8384:8384"    # Syncthing web GUI
      - "22000:22000/tcp"         # Syncthing BEP sync protocol
      - "22000:22000/udp"         # Syncthing QUIC
      - "21027:21027/udp"         # Syncthing local discovery
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SYNCTHING_GUI_USER=${SYNCTHING_GUI_USER:-admin}
      - SYNCTHING_GUI_PASSWORD=${SYNCTHING_GUI_PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Caddy reverse proxy — auto-HTTPS with Let's Encrypt
  # Set DOMAIN in .env, then: docker compose --profile proxy up -d
  caddy:
    image: caddy:2-alpine
    container_name: huginn-caddy
    restart: unless-stopped
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-huginn.yourdomain.com}
    depends_on:
      openclaw:
        condition: service_healthy

volumes:
  openclaw-state:
  vault-data:
  caddy-data:
  caddy-config:
