# Docker Compose for Huginn Second Brain (VPS Deployment)
# Local testing: run `npx openclaw` directly (no Docker needed)
# VPS deployment: `docker compose up -d`

services:
  openclaw:
    image: node:22-slim
    container_name: huginn-openclaw
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "npm install -g openclaw@latest &&
             mkdir -p /root/.openclaw/workspace/memory /root/.openclaw/workspace/skills &&
             openclaw"
    volumes:
      - ./config/openclaw.json:/root/.openclaw/openclaw.json:ro
      - openclaw-workspace:/root/.openclaw/workspace
      - openclaw-state:/root/.openclaw
      - vault-data:/vault
    ports:
      - "127.0.0.1:18789:18789"
    env_file:
      - .env
    environment:
      - NODE_ENV=production

