services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: huginn
      POSTGRES_PASSWORD: huginn
      POSTGRES_DB: huginn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huginn"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
